<!doctype html>
<html lang="en">
  <head>
    <title>STI Advertisement Survey Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="stilogo.png" alt="STI Logo" class="stilogo" />
        <h1>STI College Fairview</h1>
        <h2>Advertisement Survey</h2>
      </header>
      <form action="#" method="get">
        <div class="field">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Your Fullname"
            required
          />
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="lastname.yourstudentid@fairview.sti.edu.ph"
            required
          />
        </div>
        <div class="field">
          <label for="course">Course/Program</label>
          <input
            type="text"
            id="course"
            name="course"
            placeholder="Your Course"
            required
          />
        </div>
        <div class="field">
          <label for="surveydate">Date and Time of Survey</label>
          <input
            type="datetime-local"
            id="surveydate"
            name="surveydate"
            required
          />
        </div>
        <div class="group">
          <p>Where did you see our advertisement?</p>
          <label class="item"
            ><input type="checkbox" name="source" value="facebook" />
            Facebook</label
          >
          <label class="item"
            ><input type="checkbox" name="source" value="television" />
            Television</label
          >
          <label class="item"
            ><input type="checkbox" name="source" value="billboard" />
            Billboard</label
          >
          <label class="item"
            ><input type="checkbox" name="source" value="website" /> STI
            Website</label
          >
          <label class="item"
            ><input type="checkbox" name="source" value="friends" />
            Friends/Family</label
          >
        </div>
        <div>
          <p>Listen to our Greeting</p>
          <audio controls>
            <source src="Thanks.mp3" type="audio/mpeg" />
            No Audio
          </audio>
        </div>
        <input type="submit" class="button" value="Submit Survey" />
      </form>
    </div>
  </body>
</html>
